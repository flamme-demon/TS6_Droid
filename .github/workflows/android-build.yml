name: Android CI (Precompiled SO Build)

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch: # 允许你在 GitHub 页面上点击手动触发

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      # 💡 核心：利用 -x 参数强制跳过原作者的 Rust 编译任务
      # Gradle 会聪明地直接把你刚刚上传的 jniLibs 里的现成 .so 库打包打包带走
      - name: Build Debug APK
        run: ./gradlew --no-daemon assembleDebug -x buildRustLibs

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: TS6-Han-Android-App
          path: app/build/outputs/apk/debug/app-debug.apk